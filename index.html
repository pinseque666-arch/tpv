<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TPV Web Express</title>
  <style>
    /* Estilos Generales y Reset */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f3f4f6;
      color: #1f2937;
      padding: 20px;
    }
    h1 {
      text-align: center;
      margin-bottom: 25px;
      color: #111827;
      font-size: 1.8rem;
    }

    /* Layout en dos columnas principal */
    .layout-tpv {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }
    @media (min-width: 768px) {
      .layout-tpv { grid-template-columns: 1.2fr 0.8fr; }
    }

    /* Paneles */
    .panel {
      background: #ffffff;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      height: fit-content;
    }
    .panel h2 {
      font-size: 1.2rem;
      margin-bottom: 18px;
      border-bottom: 2px solid #f3f4f6;
      padding-bottom: 8px;
      color: #374151;
    }

    /* Formularios e Inputs */
    .form-group { margin-bottom: 18px; }
    label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 0.9rem; color: #4b5563; }
    .lbl-centrado { text-align: center; margin-bottom: 10px; font-size: 1rem; }

    input[type="text"], select {
      width: 100%;
      padding: 12px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      color: #1f2937;
      background-color: #fff;
    }
    input:focus, select:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }
    select:disabled { background-color: #f3f4f6; color: #9ca3af; cursor: not-allowed; }

    /* Control de Cantidad (Grandes, Centrados y Coloreados) */
    .cantidad-container {
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 10px 0 20px 0;
    }
    .cantidad-control { 
      display: flex; 
      gap: 12px; 
      align-items: center;
    }
    .cantidad-control input {
      width: 85px;
      height: 55px;
      text-align: center;
      font-size: 1.4rem;
      font-weight: bold;
      border: 2px solid #cbd5e1;
      border-radius: 10px;
      background: #f9fafb;
    }
    .btn-qty {
      border: none;
      width: 55px;
      height: 55px;
      font-size: 1.6rem;
      font-weight: bold;
      cursor: pointer;
      border-radius: 10px;
      transition: background 0.2s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .btn-qty:active { transform: scale(0.95); }

    /* Variaciones de color para los botones de cantidad (Rojo y Verde) */
    .btn-menos {
      background-color: #ef4444;
      color: #ffffff;
      border: 1px solid #dc2626;
    }
    .btn-menos:hover {
      background-color: #dc2626;
    }

    .btn-mas {
      background-color: #10b981;
      color: #ffffff;
      border: 1px solid #059669;
    }
    .btn-mas:hover {
      background-color: #059669;
    }

    /* Botones de Acción */
    .btn-block {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
      transition: opacity 0.2s;
    }
    .btn-block:hover { opacity: 0.9; }
    .btn-add { background: #2563eb; color: white; }
    .btn-print { background: #10b981; color: white; margin-top: 15px; }
    .btn-clear { background: #ef4444; color: white; }

    /* Tabla del Ticket en Pantalla */
    .ticket-preview {
      min-height: 180px;
      border: 1px dashed #cbd5e1;
      border-radius: 8px;
      padding: 12px;
      background: #fafafa;
      margin-bottom: 15px;
    }
    .ticket-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.95rem;
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid #f3f4f6;
    }
    .ticket-row:last-child { border-bottom: none; }
     
    .ticket-detalles {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .ticket-articulo { font-weight: 500; color: #111827; }
    .ticket-subinfo { font-size: 0.8rem; color: #6b7280; }

    .ticket-derecha {
      display: flex;
      align-items: center;
      gap: 15px;
    }
    .ticket-precio { font-weight: 600; color: #111827; }
     
    .btn-del {
      background: none;
      border: none;
      color: #9ca3af;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 4px;
      transition: color 0.15s, background 0.15s;
    }
    .btn-del:hover { color: #ef4444; background: #fee2e2; }

    .ticket-total {
      display: flex;
      justify-content: space-between;
      font-weight: bold;
      font-size: 1.3rem;
      border-top: 2px solid #374151;
      padding-top: 12px;
      margin-top: 15px;
      color: #111827;
    }

    /* ---- ÁREA DE IMPRESIÓN ---- */
    #print-area { display: none; }

    @media print {
      body * { display: none !important; }
      #print-area, #print-area * { display: block !important; }
      #print-area .p-row { display: flex !important; justify-content: space-between !important; }
       
      #print-area {
        display: block !important;
        margin: 0;
        padding: 0;
        width: 80mm;
        max-width: 80mm;
        font-family: 'Courier New', Courier, monospace;
        font-size: 11pt;
        line-height: 1.3;
        color: #000;
        background: #fff;
      }
      .p-txt-center { text-align: center !important; }
      .p-linea { border-top: 1px dashed #000 !important; margin: 5px 0 !important; display: block !important; }
      .p-total { font-weight: bold !important; font-size: 13pt !important; margin-top: 6px !important; border-top: 1px solid #000 !important; padding-top: 3px !important; }
       
      @page { margin: 0; }
    }
  </style>
</head>
<body>

  <h1>💻 TPV San Miguel</h1>

  <div class="layout-tpv">
     
    <div class="panel">
      <h2>Nueva Línea de Venta</h2>
       
      <div class="form-group">
        <label for="cliente">Nombre del Cliente:</label>
        <input type="text" id="cliente" placeholder="Escribe el nombre del cliente...">
      </div>

      <div class="form-group">
        <label for="familia">Seleccionar Familia:</label>
        <select id="familia" onchange="filtrarArticulosPorFamilia()">
          <option value="">Cargando familias...</option>
        </select>
      </div>

      <div class="form-group">
        <label for="articulo">Seleccionar Artículo:</label>
        <select id="articulo" disabled>
          <option value="">-- Selecciona primero una familia --</option>
        </select>
      </div>

      <div class="form-group">
        <label class="lbl-centrado">Cantidad</label>
        <div class="cantidad-container">
          <div class="cantidad-control">
            <button class="btn-qty btn-menos" onclick="modificarCantidad(-1)">−</button>
            <input type="number" id="cantidad" value="1" min="1" readonly>
            <button class="btn-qty btn-mas" onclick="modificarCantidad(1)">+</button>
          </div>
        </div>
      </div>

      <button class="btn-block btn-add" onclick="agregarAlTicket()">+ Añadir al Ticket</button>
    </div>

    <div class="panel">
      <h2>Resumen del Ticket</h2>
      <div class="ticket-preview" id="ticket-preview"></div>
      <div class="ticket-total">
        <span>TOTAL:</span>
        <span id="total-pantalla">0.00 €</span>
      </div>

      <button class="btn-block btn-print" onclick="imprimirTicket()">🖨 Imprimir Ticket</button>
      <button class="btn-block btn-clear" onclick="limpiarTicket()">🗑 Vaciar</button>
    </div>

  </div>

  <div id="print-area"></div>

  <script>
    let listaArticulos = []; // Guardará objetos { familia, nombre, precio, idOriginal }
    let lineasTicket = [];

    // --- GESTIÓN DE COOKIES ---
    function setCookie(name, value, days = 30) {
      const d = new Date();
      d.setTime(d.getTime() + (days*24*60*60*1000));
      document.cookie = `${name}=${encodeURIComponent(value)};expires=${d.toUTCString()};path=/;SameSite=Lax`;
    }

    function getCookie(name) {
      const nameEQ = name + "=";
      const ca = document.cookie.split(';');
      for(let i=0; i < ca.length; i++) {
        let c = ca[i].trim();
        if (c.indexOf(nameEQ) === 0) return decodeURIComponent(c.substring(nameEQ.length, c.length));
      }
      return "";
    }

    document.getElementById('cliente').addEventListener('input', function() {
      setCookie('cliente', this.value);
    });

    // --- LOGICA DE CARGA Y SELECTORES ---
    async function cargarArticulos() {
      try {
        const respuesta = await fetch('articulos.txt');
        const texto = await respuesta.text();
        const filas = texto.trim().split('\n');
         
        // Procesar archivo plano asumiendo: Familia, Producto, Precio
        listaArticulos = filas.slice(1).map((fila, index) => {
          const partes = fila.split(',');
          if (partes.length < 3) return null;
          return {
            idOriginal: index, // Para mantener la referencia exacta
            familia: partes[0].trim(),
            nombre: partes[1].trim(),
            precio: parseFloat(partes[2].trim())
          };
        }).filter(a => a && a.familia && a.nombre && !isNaN(a.precio));

        // Extraer familias únicas
        const familiasUnicas = [...new Set(listaArticulos.map(a => a.familia))].sort();

        // Llenar el selector de Familias
        const selectorFamilia = document.getElementById('familia');
        selectorFamilia.innerHTML = '<option value="">-- Selecciona una familia --</option>';
        familiasUnicas.forEach(fam => {
          const opt = document.createElement('option');
          opt.value = fam;
          opt.textContent = fam;
          selectorFamilia.appendChild(opt);
        });

      } catch (error) {
        document.getElementById('familia').innerHTML = '<option value="">Error al cargar archivo</option>';
      }
    }

    // Ejecutado cada vez que cambia el selector de familia
    function filtrarArticulosPorFamilia() {
      const familiaSeleccionada = document.getElementById('familia').value;
      const selectorArticulo = document.getElementById('articulo');

      if (!familiaSeleccionada) {
        selectorArticulo.innerHTML = '<option value="">-- Selecciona primero una familia --</option>';
        selectorArticulo.disabled = true;
        return;
      }

      // Filtrar el array global
      const articulosFiltrados = listaArticulos.filter(a => a.familia === familiaSeleccionada);

      // Renderizar las opciones filtradas
      selectorArticulo.innerHTML = '<option value="">-- Selecciona un artículo --</option>';
      articulosFiltrados.forEach(art => {
        const opt = document.createElement('option');
        opt.value = art.idOriginal; // Guardamos su ID único global
        opt.textContent = `${art.nombre} (${art.precio.toFixed(2)} €)`;
        selectorArticulo.appendChild(opt);
      });

      selectorArticulo.disabled = false;
    }

    function modificarCantidad(valor) {
      const inputCant = document.getElementById('cantidad');
      let actual = parseInt(inputCant.value) || 1;
      actual = Math.max(1, actual + valor);
      inputCant.value = actual;
    }

    // --- MANEJO DEL TICKET ---
    function agregarAlTicket() {
      const selectArt = document.getElementById('articulo');
      const inputCant = document.getElementById('cantidad');
       
      if(selectArt.value === "") {
        alert("Por favor, selecciona un artículo válido.");
        return;
      }

      // Buscamos el artículo real usando el ID guardado en el value
      const idBuscado = parseInt(selectArt.value);
      const articuloSeleccionado = listaArticulos.find(a => a.idOriginal === idBuscado);
      const cantidad = parseInt(inputCant.value) || 1;

      const indexExistente = lineasTicket.findIndex(l => l.nombre === articuloSeleccionado.nombre);
      if(indexExistente > -1) {
        lineasTicket[indexExistente].cantidad += cantidad;
      } else {
        lineasTicket.push({
          nombre: articuloSeleccionado.nombre,
          precio: articuloSeleccionado.precio,
          cantidad: cantidad
        });
      }

      // Resetear formulario para el siguiente artículo
      inputCant.value = 1;
      selectArt.value = "";
      document.getElementById('familia').value = "";
      selectArt.disabled = true;
      selectArt.innerHTML = '<option value="">-- Selecciona primero una familia --</option>';
      
      renderTicket();
    }

    function eliminarArticulo(index) {
      lineasTicket.splice(index, 1);
      renderTicket();
    }

    function renderTicket() {
      const preview = document.getElementById('ticket-preview');
      const totalPantalla = document.getElementById('total-pantalla');
       
      if(lineasTicket.length === 0) {
        preview.innerHTML = '<div style="color:#9ca3af; text-align:center; padding-top:60px;">El ticket está vacío</div>';
        totalPantalla.textContent = "0.00 €";
        return;
      }

      let html = "";
      let total = 0;

      lineasTicket.forEach((l, index) => {
        const subtotal = l.precio * l.cantidad;
        total += subtotal;
        html += `
          <div class="ticket-row">
            <div class="ticket-detalles">
              <span class="ticket-articulo">${l.nombre}</span>
              <span class="ticket-subinfo">${l.cantidad} x ${l.precio.toFixed(2)} €</span>
            </div>
            <div class="ticket-derecha">
              <span class="ticket-precio">${subtotal.toFixed(2)} €</span>
              <button class="btn-del" onclick="eliminarArticulo(${index})">✕</button>
            </div>
          </div>
        `;
      });

      preview.innerHTML = html;
      totalPantalla.textContent = `${total.toFixed(2)} €`;
    }

    function limpiarTicket() {
      if(lineasTicket.length === 0) return;
      if(confirm('¿Deseas vaciar por completo el ticket actual?')) {
        lineasTicket = [];
        renderTicket();
      }
    }

    // --- PROCESO DE IMPRESIÓN ---
    function imprimirTicket() {
      if(lineasTicket.length === 0) {
        alert("No hay artículos en el ticket para imprimir.");
        return;
      }

      const cliente = document.getElementById('cliente').value.trim() || "Venta General";
      const fechaHora = new Date().toLocaleString('es-ES');
      let total = 0;

      let htmlImpresion = `
        <div class="p-txt-center">
          <strong>*** TICKET DE VENTA ***</strong><br>
          <span>Tienda Express S.A.</span>
        </div>
        <div class="p-linea"></div>
        <div>
          <strong>Fecha:</strong> ${fechaHora}<br>
          <strong>Cliente:</strong> ${cliente}
        </div>
        <div class="p-linea"></div>
      `;

      lineasTicket.forEach(l => {
        const subtotal = l.precio * l.cantidad;
        total += subtotal;
        htmlImpresion += `
          <div class="p-row">
            <span>${l.nombre} x${l.cantidad}</span>
            <span>${subtotal.toFixed(2)} €</span>
          </div>
        `;
      });

      htmlImpresion += `
        <div class="p-total p-row">
          <span>TOTAL:</span>
          <span>${total.toFixed(2)} €</span>
        </div>
        <div class="p-linea"></div>
        <div class="p-txt-center" style="font-size: 10pt; margin-top:10px;">
          ¡Gracias por su compra!
        </div>
      `;

      document.getElementById('print-area').innerHTML = htmlImpresion;
      window.print();
    }

    // --- AL CARGAR LA PÁGINA ---
    window.onload = () => {
      cargarArticulos();
       
      const clienteGuardado = getCookie('cliente');
      if(clienteGuardado) {
        document.getElementById('cliente').value = clienteGuardado;
      }
       
      renderTicket();
    };
  </script>
</body>
</html>
